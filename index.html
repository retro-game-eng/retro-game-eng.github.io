<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>レトロゲーから学ぶエンジニアとかマジウケる！</title>
  <meta name="description" content="レトロゲーから学ぶエンジニアとかマジウケる！ 公式ページ">
  <style>
    :root {
      --bg: #080808;
      --window-bg: #101828;
      --fg: #ffffff;
      --muted: #cfd6e6;
      --border: #ffffff;
      --accent: #ffd84d;
      --shadow: #3b3b3b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        var(--bg);
      background-size: 24px 24px;
      color: var(--fg);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      line-height: 1.7;
    }

    main {
      width: min(92vw, 760px);
      padding: 32px 16px;
      text-align: center;
    }

    .game-window {
      position: relative;
      padding: clamp(28px, 6vw, 48px) clamp(20px, 5vw, 40px);
      border: 4px solid var(--border);
      background: var(--window-bg);
      box-shadow: 10px 10px 0 var(--shadow);
    }

    .game-window::before {
      content: "OFFICIAL SITE";
      position: absolute;
      top: -18px;
      left: 20px;
      padding: 0 12px;
      background: var(--bg);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.12em;
    }

    .logo {
      max-width: min(100%, 420px);
      height: auto;
      margin-bottom: 28px;
      image-rendering: auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.6rem, 5vw, 2.7rem);
      line-height: 1.35;
      letter-spacing: 0.06em;
      text-shadow: 3px 3px 0 #000000;
    }

    .abbr {
      display: inline-block;
      margin: 0 0 32px;
      padding: 4px 14px;
      border: 2px solid var(--accent);
      color: var(--accent);
      font-weight: 700;
      font-size: 1rem;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .link-button {
      position: relative;
      display: inline-block;
      padding: 14px 20px 14px 34px;
      border: 3px solid var(--border);
      background: #050505;
      color: var(--fg);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: 5px 5px 0 var(--shadow);
      transition: transform 0.12s ease, box-shadow 0.12s ease, color 0.12s ease;
    }

    .link-button::before {
      content: "▶";
      position: absolute;
      left: 12px;
      color: var(--accent);
    }

    .link-button:hover,
    .link-button:focus-visible {
      color: var(--accent);
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 var(--shadow);
      outline: none;
    }

    .organizer {
      display: inline-block;
      margin-top: 4px;
      padding: 14px 18px;
      border: 2px dashed rgba(255, 255, 255, 0.55);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .organizer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 800;
    }

    .organizer a:hover,
    .organizer a:focus-visible {
      text-decoration: underline;
    }

    footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    @media (max-width: 560px) {
      .links {
        grid-template-columns: 1fr;
      }

      .game-window {
        box-shadow: 6px 6px 0 var(--shadow);
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="game-window" aria-label="レト学！公式サイト">
      <!-- ロゴ画像のファイル名は配置先に合わせて変更してください -->
      <img class="logo" src="./logo.png" alt="レトロゲーから学ぶエンジニアとかマジウケる！ ロゴ">

      <h1>レトロゲーから学ぶ<br>エンジニアとか<br>マジウケる！</h1>
      <p class="abbr">通称：レト学！</p>

      <nav class="links" aria-label="関連リンク">
        <a class="link-button" href="https://retro-games-any.connpass.com/" target="_blank" rel="noopener noreferrer">connpass</a>
        <a class="link-button" href="https://x.com/retro_game_eng" target="_blank" rel="noopener noreferrer">公式X</a>
      </nav>

      <div class="organizer">
        主催：キタジー（<a href="https://x.com/kitaji0306" target="_blank" rel="noopener noreferrer">@kitaji0306</a>）
      </div>

      <footer>
        &copy; レトロゲーから学ぶエンジニアとかマジウケる！
      </footer>
    </section>
  </main>
</body>
</html>
